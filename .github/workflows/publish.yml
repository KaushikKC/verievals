name: publish

# Build and publish to PyPI automatically when a version tag is pushed:
#     git tag v0.1.1 && git push --tags
#
# Uses PyPI Trusted Publishing (OIDC) — no API token/secret needed. One-time
# setup: on PyPI, add this repo + workflow as a trusted publisher for `verievals`
# (see docs/RELEASING.md).

on:
  push:
    tags: ["v*"]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write        # required for trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build

      - name: Check metadata
        run: |
          pip install twine
          twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
